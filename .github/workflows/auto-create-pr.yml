name: Auto Create PR on First Branch Push

on:
  push:
    branches:
      - "**"

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    if: github.ref_type == 'branch' && github.ref_name != 'main' && github.ref_name != 'master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create PR if one does not exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          BASE_BRANCH="${{ github.event.repository.default_branch || 'main' }}"

          EXISTING_PR=$(gh pr list \
            --head "$BRANCH_NAME" \
            --base "$BASE_BRANCH" \
            --state all \
            --json number \
            --jq '.[0].number')

          if [ -n "$EXISTING_PR" ]; then
            echo "PR already exists: #$EXISTING_PR"
            exit 0
          fi

          PR_BODY="$(cat <<'EOF'
          This PR was automatically created on first push of this branch.

          ## Summary
          - Initial changes from this branch
          EOF
          )"

          gh pr create \
            --title "Auto PR: $BRANCH_NAME" \
            --body "$PR_BODY" \
            --base "$BASE_BRANCH" \
            --head "$BRANCH_NAME"
